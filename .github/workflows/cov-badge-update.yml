##RECOMMENDATION - REFERENCED IN PRE-COMMIT/PRE-PUSH - ECR - FEATURE/CODE-COVERAGE
name: 'Create a code coverage badge for main'

on:
  workflow_call:
    inputs:
      php:
        required: true
        type: string
      timeout:
        default: 5
        type: number

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout }}
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php }}

      - name: Install Composer...
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Create code coverage report
        run: XDEBUG_MODE=coverage ./vendor/bin/phpunit --coverage-clover clover.xml

      - name: Coverage percentage
        uses: sergiy-decima/clover-coverage-action@1.0.0
        if: always()
        with:
          filename: clover.xml

      - name: Update badge
        run: sed -i "s/41/99/g" ${{ github.repository }}/public/images/code-coverage.svg
