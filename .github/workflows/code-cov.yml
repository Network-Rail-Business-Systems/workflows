name: 'Run code coverage whenever a pull request is opened'

on:
  workflow_call:
    inputs:
      artisan:
        default: true
        type: boolean
      xdebug:
        default: false
        type: boolean
      composer:
        default: true
        type: boolean
      env:
        default: true
        type: boolean
      npm:
        default: true
        type: boolean
      php:
        required: true
        type: string
      timeout:
        default: 5
        type: number
      vite:
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout }}
    steps:
      - uses: actions/checkout@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php }}

      - name: Install Composer...
        if: inputs.composer == true
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install NPM...
        if: inputs.npm == true
        run: npm install

      - name: Create .env...
        if: inputs.env == true
        run: cp .env.example .env

      - name: Generate key...
        if: inputs.env == true
        run: php artisan key:generate

      - name: Run Vite...
        if: inputs.npm == true && inputs.vite == true
        run: npm run build

      - name: Run Laravel Mix...
        if: inputs.npm == true && inputs.vite == false
        run: npm run prod

      - name: Run XDebug...
        if: inputs.xdebug == false
        run: npm run coverage

      - name: Create code coverage badge
        uses: timkrase/phpunit-coverage-badge@v1.2.1
        with:
          coverage_badge_path: output/git-add-coverage.svg
          push_badge: false

      - name: Push code coverage badge
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_dir: ./output
          github_token: ${{ secrets.GITHUB_TOKEN }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          keep_files: true
